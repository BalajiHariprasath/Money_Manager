<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Money Manager - Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="auth-container">
      <div class="auth-form">
        <h1>💰 Money Manager</h1>
        <p class="subtitle">Track your lending with friends</p>

        <div class="form-tabs">
          <button class="tab-btn active" id="loginTab">Login</button>
          <button class="tab-btn" id="registerTab">Register</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="form-content active">
          <div class="form-group">
            <label for="loginUsername">Username</label>
            <input type="text" id="loginUsername" placeholder="Enter your username" required>
          </div>

          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" placeholder="Enter your password" required>
          </div>

          <div id="loginError" class="error-message"></div>

          <button type="submit" class="btn btn-primary">Login</button>
        </form>

        <!-- Register Form -->
        <form id="registerForm" class="form-content">
          <div class="form-group">
            <label for="regUsername">Username</label>
            <input type="text" id="regUsername" placeholder="Choose a username" required>
          </div>

          <div class="form-group">
            <label for="regEmail">Email</label>
            <input type="email" id="regEmail" placeholder="Enter your email" required>
          </div>

          <div class="form-group">
            <label for="regPassword">Password</label>
            <input type="password" id="regPassword" placeholder="Enter a password" required>
          </div>

          <div class="form-group">
            <label for="regPassword2">Confirm Password</label>
            <input type="password" id="regPassword2" placeholder="Confirm password" required>
          </div>

          <div id="registerError" class="error-message"></div>

          <button type="submit" class="btn btn-primary">Register</button>
        </form>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
